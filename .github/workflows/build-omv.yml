name: ssX-e16 OpenMandriva Build

on:
  push:
    branches: [ main, ssx-integration ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Using OpenMandriva's rolling container to match your dev environment
    container:
      image: openmandriva/cooker:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          dnf --refresh --nodocs install -y \
            clang lld binutils glibc-devel kernel-headers \
            meson ninja pkgconf gettext \
            lib64x11-devel lib64xext-devel lib64xi-devel \
            lib64xrandr-devel lib64xrender-devel lib64xinerama-devel \
            lib64xdamage-devel lib64xfixes-devel lib64xcomposite-devel \
            lib64xpresent-devel lib64xscrnsaver-devel lib64imlib2-devel \
            lib64dbus-1-devel lib64xft-devel lib64fontconfig-devel \
            lib64sm-devel lib64ice-devel \
            lib64alsa-devel lib64pulseaudio-devel \
            lib64sndio-devel lib64pango-devel

      - name: Configure Meson
        run: |
          export CC=clang
          # Move the linker flag into the meson setup command for better stability
          meson setup build \
            -Dc_link_args="-fuse-ld=lld" \
            -Denable-sound=true \
            -Denable-xpresent=true \
            -Denable-screensaver=true \
            --buildtype=release

      - name: Compile ssX-e16
        run: ninja -C build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssX-e16-binary
          path: build/e16
